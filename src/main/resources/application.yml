spring:
  application:
    name: tradesim

  datasource:
    url: jdbc:h2:mem:tradesim
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

server:
  port: 8082

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: tradesim-secret-key-for-jwt-token-generation-2024
  expiration: 86400000

# 行情模拟配置
market:
  update-interval: 60000  # 每60秒更新一次行情

service:
  internal-key: fintech-internal-service-key-2024
  quickpay:
    url: http://localhost:8081
  riskcontrol:
    url: http://localhost:8084

logging:
  level:
    com.fintech.tradesim: DEBUG
